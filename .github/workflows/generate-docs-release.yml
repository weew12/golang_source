name: 自动生成 Go 文档、发布 Release 并部署 Pages

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
      - '*.md'

# 必要的权限配置
permissions:
  contents: write
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # 任务 1: 生成文档
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: 安装 doc2go 工具
        run: go install go.abhg.dev/doc2go@latest

      - name: 生成静态文档
        run: |
          export GOROOT=$GITHUB_WORKSPACE/go1.26
          doc2go -out ./go1.26-full std
          
          # 验证生成
          if [ ! -d "./go1.26-full" ]; then
            echo "错误：文档生成失败"
            exit 1
          fi
          
          echo "文档生成成功"
          ls -la ./go1.26-full

      - name: 注入自定义 CSS
        run: |
          CUSTOM_CSS=".github/styles/custom.css"
          TARGET_CSS="./go1.26-full/_/css/main.css"
          
          if [ -f "$CUSTOM_CSS" ]; then
            cp "$CUSTOM_CSS" "$TARGET_CSS"
            echo "✅ 自定义样式已替换默认 main.css"
          else
            echo "⚠️ 自定义样式文件不存在，使用默认样式"
          fi
      
      - name: 上传文档产物（供后续任务使用）
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./go1.26-full  # 这将是 GitHub Pages 的根目录
          name: github-pages

      - name: 打包文档为 ZIP（用于 Release）
        run: |
          SHA=$(git rev-parse --short HEAD)
          DATE=$(date +%Y%m%d)
          ZIP_NAME="go1.26-docs-${DATE}-${SHA}.zip"
          
          zip -r "$ZIP_NAME" go1.26-full/
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "RELEASE_TAG=v${DATE}-${SHA}" >> $GITHUB_ENV
          
          echo "打包完成：$ZIP_NAME"

      - name: 上传 ZIP 产物（供 Release 任务使用）
        uses: actions/upload-artifact@v4
        with:
          name: release-zip
          path: ${{ env.ZIP_NAME }}
          retention-days: 1

      - name: 保存版本信息
        run: |
          echo "RELEASE_TAG=${{ env.RELEASE_TAG }}" >> release-info.txt
          echo "ZIP_NAME=${{ env.ZIP_NAME }}" >> release-info.txt
          
      - name: 上传版本信息
        uses: actions/upload-artifact@v4
        with:
          name: release-info
          path: release-info.txt
          retention-days: 1

  # 任务 2: 部署到 GitHub Pages
  deploy-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 任务 3: 创建 Release
  create-release:
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: 下载版本信息
        uses: actions/download-artifact@v4
        with:
          name: release-info

      - name: 读取版本信息
        id: read-info
        run: |
          cat release-info.txt >> $GITHUB_ENV

      - name: 下载 ZIP 包
        uses: actions/download-artifact@v4
        with:
          name: release-zip

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Go 1.26 文档 ${{ env.RELEASE_TAG }}
          body: |
            ## 📚 Go 1.26 标准库文档
            
            本次发布包含：
            - ✅ 完整的静态 HTML 文档
            - 📦 ZIP 压缩包下载
            - 🌐 在线浏览：${{ vars.PAGES_URL || '请在仓库设置中配置 Pages 地址' }}
            
            ---
            *由 GitHub Actions 自动构建发布*
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}